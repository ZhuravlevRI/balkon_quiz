services:
  db:
    image: postgres:18
    container_name: balkon_quiz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-balkon_quiz}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-balkon_quiz}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: balkon_quiz_backend
    restart: unless-stopped
    working_dir: /app/backend
    env_file:
      - backend/.env
    environment:
      POSTGRES_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    restart: always
    build:
      context: frontend/
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${BACKEND_HOST?Variable not set}${API_V1_STR?Variable not set}
        - NODE_ENV=production
    ports:
      - "8080:80"

volumes:
  postgres_data:
